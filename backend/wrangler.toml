name = "abhay-creative-backend"
main = "index.js"
compatibility_date = "2026-07-16" # Updated to today's date for compatibility
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# 1. Ensure the Email binding is properly defined
# Note: Cloudflare Email Binding requires specific configuration depending on your plan
[[send_email]]
name = "EMAIL"

[vars]
# Frontend origin (Replace * with your actual Pages URL once deployed for security)
FRONTEND_ORIGIN = "https://abhay-creative.pages.dev"

# MongoDB Data API Configuration
# Set these secrets using: npx wrangler secret put <SECRET_NAME>
# Required secrets:
# - MONGODB_DATA_API_URL: Your MongoDB Data API endpoint URL
# - MONGODB_API_KEY: Your MongoDB Data API key
# Optional secrets (defaults provided):
# - MONGODB_DATA_SOURCE: Default "Cluster0"
# - MONGODB_DATABASE: Default "portfolio"

# Contact Form settings
CONTACT_TO = "abhayhegde643@gmail.com"
CONTACT_FROM = "abhayhegde643@gmail.com"
HIRE_TO = "abhayhegde643@gmail.com"
HIRE_FROM = "abhayhegde643@gmail.com"