name = "abhay-creative-backend"
main = "index.js"
compatibility_date = "2026-07-16" # Updated to today's date for compatibility
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# 1. Ensure the Email binding is properly defined
# Note: Cloudflare Email Binding requires specific configuration depending on your plan
[[send_email]]
name = "EMAIL"

[vars]
# Frontend origin (Replace * with your actual Pages URL once deployed for security)
FRONTEND_ORIGIN = "https://abhay-creative.pages.dev"

# Supabase Configuration
# Set these secrets using: npx wrangler secret put <SECRET_NAME>
# Required secrets:
# - SUPABASE_URL: Your Supabase project URL
# - SUPABASE_KEY: Your Supabase anon/public key (or service role key for admin access)

# Contact Form settings
CONTACT_TO = "abhayhegde36@gmail.com"
CONTACT_FROM = "onboarding@resend.dev"
HIRE_TO = "abhayhegde36@gmail.com"
HIRE_FROM = "onboarding@resend.dev"
